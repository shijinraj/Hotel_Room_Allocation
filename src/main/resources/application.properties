spring.application.name=allocation
server.port=8080
# Enable RFC 9457 Problem Details error responses
spring.mvc.problemdetails.enabled=true
# Graceful shutdown ? allow in-flight requests to complete
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Actuator health, info & cache endpoints
management.endpoints.web.exposure.include=health,info,caches,metrics
management.endpoint.health.show-details=when-authorized
# Logging
logging.level.com.shijin.hotel.room.allocation=INFO
# SpringDoc OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


